short_bio: | 
  <p>Hi! I am Yaohui Han (韩耀辉), a Ph.D. student at <a href="https://www.cse.cuhk.edu.hk/">Department of Computer Science and Engineering</a>, <a href="https://www.cuhk.edu.hk/chinese/index.html">Chinese University of Hong Kong</a>, supervised by <a href="https://tsungyiho.github.io/">Prof. Tsung-Yi Ho</a>. I am also very fortunate to work with <a href="https://www.cse.cuhk.edu.hk/~byu/">Prof. Bei Yu</a> and <a href="https://mypage.cuhk.edu.cn/academics/chentinghuan/">Prof. Tinghuan Chen</a>. Before this, I obtained my bachelor's degree at <a href="https://www.csu.edu.cn/">Central South University</a> and my high school diploma at <a href="https://zh.wikipedia.org/wiki/%E4%B8%9C%E5%8C%97%E8%82%B2%E6%89%8D%E5%AD%A6%E6%A0%A1">Northeast Yucai School</a> in Shenyang.</p>
  <p>During the past years, I have actively participated in several projects and competitions. I won the first National 1st Prize in the Electronic Design Contest in the history of my university. Currently, my research interest is <a href="https://en.wikipedia.org/wiki/Electronic_design_automation">Electronic Design Automation</a> and <a href="https://en.wikipedia.org/wiki/Applications_of_artificial_intelligence">AI + X</a>. I am always looking for potential collaboration opportunities. If you have any idea on research in related fields, please feel free to contact me!</p>
  <p>During my leisure time, I am also an enthusiast of basketball&#x1F3C0;, badminton&#x1F3F8;, racing&#x1F3CE;, piano&#127929; and astronomy&#x1F52D;, and always willing to try new things.</p>
